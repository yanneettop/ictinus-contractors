            var missing = [];

              if (!val) missing.push(field);

            var emailVal = (fd.get('email') || '').toString().trim();
            if (emailVal && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)) {
              missing.push('email (invalid format)');
            }

            if (missing.length > 0) {
              notice.className = 'ict-form-notice error show';

              notice.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
